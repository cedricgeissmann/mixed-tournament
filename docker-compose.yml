services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - tournament
    restart: unless-stopped

  tournament:
    build: .
    expose:
      - "3000"
    volumes:
      - tournament-data:/app/data
    environment:
      PORT: 3000
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      DB_PATH: /app/data/tournament.db
    restart: unless-stopped

volumes:
  tournament-data:
  caddy-data:
  caddy-config:
